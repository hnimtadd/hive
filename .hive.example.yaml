# Hive Configuration File
# Place this file as ~/.hive.yaml or .hive.yaml in project root

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10

ai:
  provider: "claude"
  model: "claude-3-5-sonnet-20241022"
  api_key_env: "ANTHROPIC_API_KEY"
  # base_url: ""  # Optional: custom API endpoint
  parameters:
    max_tokens: "4096"
    temperature: "0.1"

gitlab:
  url: "https://gitlab.com"
  token_env: "GITLAB_TOKEN"
  workspace_dir: "$HOME/.hive/workspace"

# Jira Integration
# Enable this to allow the agent to auto-discover task information from Jira tickets
jira:
  enabled: false  # Set to true to enable Jira integration
  base_url: "https://your-company.atlassian.net"
  username: "your-email@company.com"
  api_token_env: "JIRA_API_TOKEN"  # Environment variable containing Jira API token

  # Custom fields to extract from Jira tickets
  # Map your organization's custom field IDs to friendly names
  # The Agent will include these in the task analysis
  custom_fields:
    customfield_10206: "Implementation Guide & Definition of Done"
    # Add more custom fields as needed:
    # customfield_xxxxx: "Acceptance Criteria"
    # customfield_yyyyy: "Technical Specifications"
    # customfield_zzzzz: "Business Requirements"

agents:
  max_concurrent: 5
  timeout_seconds: 300

  ai_code_editor:
    enabled: true
    max_tasks: 2
    capabilities:
      - "ai_code_generation"
      - "feature_development"
      - "gitlab_integration"
      - "automated_commits"
      - "merge_request_creation"

server:
  port: 8080
  host: "localhost"
  metrics_port: 9090

# Environment Variables Required:
# - ANTHROPIC_API_KEY: Your Claude API key
# - GITLAB_TOKEN: Your GitLab personal access token
# - JIRA_API_TOKEN: Your Jira API token (optional, only if jira.enabled is true)
