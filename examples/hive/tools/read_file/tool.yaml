name: "read_file"
description: >
  Read contents of a text file from the filesystem.
  Supports files up to 10MB, automatically detects binary files.
runtime: "hive"
entrypoint: ["./read_file"]
timeout: 30

parameters:
  type: "object"
  properties:
    path:
      type: "string"
      description: "Path to the file to read (absolute or relative)"
  required: ["path"]
