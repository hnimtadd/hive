name: "shell_execute"
description: >
  Execute shell commands with safety checks and timeout protection.
  Supports git operations, package managers, build tools, and testing.
runtime: "hive"
entrypoint: ["shell_execute"]
timeout: 600

parameters:
  type: "object"
  properties:
    command:
      type: "string"
      description: "Shell command to execute"
    working_dir:
      type: "string"
      description: "Working directory for command execution (optional, defaults to current dir)"
    timeout:
      type: "integer"
      description: "Timeout in seconds (default 300, max 600)"
  required: ["command"]
