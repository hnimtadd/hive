name: "list_files"
description: >
  Lists files and directories in a specific path. Use this to explore the
  workspace structure, find specific filenames, or map out a project's hierarchy.
  Returns names, sizes (in bytes), and types (file vs directory).

# Execution Contract
runtime: "native"
entrypoint: "list_files" # The name of your compiled Go binary
timeout: 15 # FS operations are fast, but recursive walks on large dirs need a buffer

# JSON Schema for LLM Parameter Injection
parameters:
  type: "object"
  properties:
    path:
      type: "string"
      description: "The directory path to list. Use '.' for the current root. Supports relative and absolute paths."
    recursive:
      type: "boolean"
      description: "If true, will walk through all subdirectories. Use with caution in large projects."
      default: false
  required:
    - "path"
