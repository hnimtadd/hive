syntax = "proto3";

package agent.v1;

option go_package = "gen/agent/v1;agentv1";

// The AgentService handles the lifecycle of a supervisor-led task.
service AgentService {
  // ExecuteTask starts the supervisor loop and streams real-time updates back to the CLI.
  rpc ExecuteTask(ExecuteTaskRequest) returns (stream TaskUpdate);
}

message ExecuteTaskRequest {
  string global_goal = 1;
  map<string, string> initial_artifacts = 2;
}

// TaskUpdate is a polymorphic message representing different events in the agent loop.
message TaskUpdate {
  oneof payload {
    Thought thought = 1;          // The Supervisor's reasoning
    WorkerAction delegation = 2;  // Information about a sub-task starting
    ArtifactFound artifact = 3;   // New data merged into the state
    FinalResult result = 4;       // The final output to the user
    ErrorNotice error = 5;        // Non-fatal or fatal error details
  }
}

message Thought {
  string content = 1;
  string status = 2; // e.g., "PLANNING", "ANALYZING"
}

message WorkerAction {
  string agent_name = 1;
  string instruction = 2;
}

message ArtifactFound {
  string key = 1;
  string summary = 2; // A short description of the new data
}

message FinalResult {
  string content = 1;
  string completion_time = 2;
}

message ErrorNotice {
  string message = 1;
  bool is_fatal = 2;
}
