syntax = "proto3";

package agent.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "gen/agent/v1;agentv1";

// The AgentService handles the lifecycle of a supervisor-led task.
service AgentService {
  // ExecuteTask starts the supervisor loop and streams real-time updates back to the CLI.
  rpc ExecuteTask(stream ExecuteTaskRequest) returns (stream ExecuteTaskResponse);

  // HiveSession opens new hive session.
  rpc HiveSession(stream HiveSessionRequest) returns (stream HiveSessionResponse);
}

message HiveSessionRequest {
  // Client-generated request identifier for response correlation.
  string request_id = 7;
  google.protobuf.Timestamp at = 1;

  oneof payload {
    CreateConversationRequest create_conversation = 2;
    TurnRequest turn_request = 3;
    SubmitRequiredInput input = 4;
    Ping ping = 6;
  }
}

message HiveSessionResponse {
  // Echoes HiveSessionRequest.request_id when this response relates to a request.
  string in_reply_to = 7;
  google.protobuf.Timestamp at = 1;

  oneof payload {
    CreateConversationResponse create_conversation = 2;
    TurnResponse turn_response = 3;
    InputRequired input_required = 4;
    Notification notification = 5;
    Pong pong = 6;
  }
}

message CreateConversationRequest {
  oneof mode {
    string resume_id = 1;
    google.protobuf.Empty create_new = 2;
  }
}

message CreateConversationResponse {
  string conversation_id = 1;
  string location = 2;
}

message TurnRequest {
  // Optional conversation scope for this turn command.
  string conversation_id = 5;
  // Optional turn scope for this turn command.
  string turn_id = 6;
  google.protobuf.Timestamp at = 1;
  oneof payload {
    CreateTurn create_turn = 2;
    string cancel_turn_id = 3;
    string retry_turn_id = 4;
  }
}

message TurnResponse {
  // Optional conversation scope for this turn event.
  string conversation_id = 6;
  // Optional turn scope for this turn event.
  string turn_id = 7;
  // Correlates to the originating TurnRequest when present.
  string request_id = 1;

  oneof payload {
    google.protobuf.Empty ack = 2;
    TurnUpdate update = 3;
    TurnCompleted completed = 5; // The final output to the user
  }
}

message TurnUpdate {
  string content = 2;
}

message InputRequired {
  // Optional conversation scope for this interaction.
  string conversation_id = 1;
  // Optional turn scope for this interaction.
  string turn_id = 2;
  string question = 3;
}

message SubmitRequiredInput {
  // Optional conversation scope for this interaction reply.
  string conversation_id = 1;
  // Optional turn scope for this interaction reply.
  string turn_id = 2;
  string answer = 3;
}

message TurnCompleted {
  oneof payload {
    SuccessUpdate success = 1;
    ErrorUpdate failed = 2;
  }
}

message Notification {
  oneof payload {
    string error = 1;
    string info = 2;
  }
}

message CreateTurn {
  string message = 1;
  map<string, string> initial_artifacts = 2;
}

message Ping {
  google.protobuf.Timestamp at = 1;
}

message Pong {
  google.protobuf.Timestamp at = 1;
}

message ExecuteTaskRequest {
  google.protobuf.Timestamp at = 1;

  oneof payload {
    TaskRequest request = 2; // Sent first to begin the loop
    UserFeedback feedback = 3; // Sent when the supervisor ask a question
    Cancel cancel = 4; // Sent if the user cancel the CLI request
  }
}

message TaskRequest {
  string global_goal = 1;
  map<string, string> initial_artifacts = 2;
}

message UserFeedback {
  string feedback = 1;
}

message Cancel {}

// TaskUpdate is a polymorphic message representing different events in the agent loop.
message ExecuteTaskResponse {
  google.protobuf.Timestamp at = 1;

  oneof payload {
    InProgressUpdate update = 2; // The Supervisor's reasoning
    SuccessUpdate success = 3; // The final output to the user
    ErrorUpdate error = 4; // Non-fatal or fatal error details
    FeedbackRequire feedback = 5; // in the middle feedback require
    RequestAck ack = 6; // ack of the request including the initial information like request ID.
  }
}

message RequestAck {
  string task_id = 1;
}

message InProgressUpdate {
  string content = 1;
  string status = 2; // e.g., "PLANNING", "ANALYZING"
}

message FeedbackRequire {
  string question = 1;
}

message SuccessUpdate {
  string content = 1;
}

message ErrorUpdate {
  string message = 1;
}
